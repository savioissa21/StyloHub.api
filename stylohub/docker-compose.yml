services:
  postgres:
    image: postgres:16-alpine
    container_name: stylohub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stylohub
      POSTGRES_USER: ${DB_USERNAME:-stylohub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stylohub}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stylohub} -d stylohub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stylohub-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
