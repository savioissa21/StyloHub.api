spring.application.name=stylohub

# ==================== DataSource ====================
spring.datasource.url=jdbc:postgresql://localhost:5433/stylohub
spring.datasource.username=${DB_USERNAME:stylohub}
spring.datasource.password=${DB_PASSWORD:stylohub}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== Flyway ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:stylohub-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ==================== Cloudinary ====================
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# ==================== Stripe ====================
app.stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
app.stripe.pro-price-id=${STRIPE_PRO_PRICE_ID:price_placeholder}

# ==================== Resend (email) ====================
app.resend.api-key=${RESEND_API_KEY:re_placeholder}
app.resend.from-email=${RESEND_FROM_EMAIL:noreply@stylohub.com}
app.resend.from-name=${RESEND_FROM_NAME:StyloHub}

# ==================== Frontend ====================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ==================== CORS ====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==================== Async ====================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=stylohub-async-

# ==================== Jackson ====================
spring.jackson.default-property-inclusion=non_null

# ==================== Swagger / OpenAPI ====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
