spring.application.name=stylohub

# ==================== DataSource ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/stylohub
spring.datasource.username=${DB_USERNAME:stylohub}
spring.datasource.password=${DB_PASSWORD:stylohub}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== Flyway ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:stylohub-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==================== Async ====================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=stylohub-async-

# ==================== Jackson ====================
spring.jackson.default-property-inclusion=non_null
